<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mapa Mejorado sin API</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <link rel="stylesheet" href="estilos/estilo.css">
    <div class="container my-5">
        <h2 class="text-center mb-4">Ubicación en Google Maps</h2>

        <div class="card shadow-sm">
            <div class="card-body">
                <p class="text-muted">Mapa centrado en las coordenadas con marcador:</p>

                <ul>
                    <li><strong>Latitud:</strong> 20°03'37.0"N (≈ 20.0603)</li>
                    <li><strong>Longitud:</strong> 98°47'24.6"W (≈ -98.7902)</li>
                </ul>

                <!-- Contenedor responsive para el mapa -->
                <div class="map-container">
                    <iframe 
                        src="https://www.google.com/maps?q=20.0603,-98.7902&z=15&hl=es&output=embed" allowfullscreen loading="lazy">
                    </iframe>
                </div>

            </div>
        </div>
    </div>
</body>

</html>
